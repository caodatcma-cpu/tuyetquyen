<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Tâm sự bản thân</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    padding:40px;
}

.member{
    background: linear-gradient(to right, #74ebd5, #ACB6E5);
    padding:6px;
    border-radius:20px;
    width:800px;
    margin:auto;
}

.member-inner{
    background:white;
    border-radius:18px;
    padding:30px;
    position:relative;
}

h2{
    text-align:center;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:inline-block;
    width:180px;
    font-weight:600;
}

input[type="text"],
input[type="date"]{
    width:300px;
    padding:6px;
    border-radius:6px;
    border:1px solid #ccc;
}

textarea{
    width:300px;
    border-radius:6px;
    border:1px solid #ccc;
    padding:6px;
}

.radio-group,
.checkbox-group{
    margin-left:180px;
}

/* Ô ảnh */
.image-box{
    position:absolute;
    right:40px;
    top:80px;
    width:180px;
    height:180px;
    border-radius:50%;
    border:3px solid #6c63ff;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#f4f4ff;
    cursor:pointer;
}

.image-box img{
    width:100%;
    height:100%;
    object-fit:cover;
}
</style>
</head>

<body>

<div class="member">
<div class="member-inner">

<h2>TÂM SỰ ĐÔI DÒNG VỀ BẢN THÂN</h2>

<div class="form-group">
<label>Họ tên:</label>
<input type="text" name="hoten" value="Phan Thị Tuyết Quyên">
</div>

<div class="form-group">
<label>Ngày sinh:</label>
<input type="date" name="ngaysinh" value="2008-01-15">
</div>

<div class="form-group">
<label>Giới tính:</label>
<div class="radio-group">
<label><input type="radio" name="gioitinh" value="Nam"> Nam</label>
<label><input type="radio" name="gioitinh" value="Nữ" checked> Nữ</label>
</div>
</div>

<div class="form-group">
<label>Màu yêu thích:</label>
<input type="text" name="mau" value="Hồng">
</div>

<div class="form-group">
<label>Môn thể thao:</label>
</div>

<div class="checkbox-group">
<label><input type="checkbox"> Bóng đá</label><br>
<label><input type="checkbox" checked> Cầu lông</label><br>
<label><input type="checkbox"> Bóng chuyền</label><br>
<label><input type="checkbox" checked> Ca hát</label><br>
<label><input type="checkbox"> Nhảy - Múa</label><br>
<label><input type="checkbox"> Khác</label>
</div>

<div class="form-group">
<label>Môn học tự tin:</label>
<input type="text" value="Vật Lý">
</div>

<div class="form-group">
<label>Phương châm sống:</label>
<textarea rows="2">Đừng để bản thân mình sau này nhìn lại và trách mình của quá đã trì hoãn và không nổ lực</textarea>
</div>

<div class="image-box">
<img src="tuyetquyen.jpg" alt="Ảnh Phan Thị Tuyết Quyên"
onerror="this.src='https://via.placeholder.com/180?text=Thieu+Anh'">
</div>

</div>
</div>

<script>
console.log("Trang tâm sự bản thân của Quyên đã sẵn sàng!");
</script>

</body>
</html>
